name: "Publish Release"

# 触发条件：当你推送以 v 开头标签（如 v1.0.0）时自动运行
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # 1. Windows 打包配置
          - platform: 'windows-latest'
            args: '--target x86_64-pc-windows-msvc'

          # 2. Android 打包配置（💡 这里直接注入 android build 指令，规避 plugin 警告）
          - platform: 'ubuntu-22.04'
            args: 'android build --target aarch64'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---- 基础环境配置 (Windows & Ubuntu 通用) ----
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Windows 需要 msvc 目标，Android 需要 aarch64 目标
          targets: ${{ matrix.platform == 'ubuntu-22.04' && 'aarch64-linux-android' || 'x86_64-pc-windows-msvc' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ---- 针对 Android 平台的特殊硬核组件注入 ----
      - name: Setup Java and Android SDK (Android Only)
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK (Android Only)
        if: matrix.platform == 'ubuntu-22.04'
        uses: android-actions/setup-android@v3

      # 💡 注意：这里已经彻底删除了原本会报错的 "Install frontend dependencies" (pnpm install) 步骤
      # 统一交由下方的 tauri-action 官方引擎在底层自动调度，防止路径找不到的翻车情况。

      # ---- 核心：一键调用 Tauri 官方打包 Action ----
      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "App Release ${{ github.ref_name }}"
          # 💡 直接传入矩阵变量，Windows 端执行 tauri build ...，Android 端执行 tauri android build ...
          args: ${{ matrix.args }}