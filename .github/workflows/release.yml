name: "Publish Release"

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
          - platform: 'ubuntu-22.04'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---- 基础环境配置 (Windows & Ubuntu 通用) ----
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'ubuntu-22.04' && 'aarch64-linux-android' || 'x86_64-pc-windows-msvc' }}

      # 💡 特别注意：Android 交叉编译需要将相关的工具链和环境变量关联起来
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ---- 针对 Android 平台的特殊组件注入 ----
      - name: Setup Java and Android SDK (Android Only)
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK (Android Only)
        if: matrix.platform == 'ubuntu-22.04'
        uses: android-actions/setup-android@v3

      # ---- 🚀 编译分流 1：Windows 保持原样，利用官方 Action 自动创建 Release 并上传 ----
      - name: Build Windows App
        if: matrix.platform == 'windows-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "App Release ${{ github.ref_name }}"
          args: '--target x86_64-pc-windows-msvc'

      # ---- 🚀 编译分流 2：Android 改用纯原生命令，不给官方 Action 任何瞎拼参数的机会 ----
      - name: Install Node Dependencies (Android Only)
        if: matrix.platform == 'ubuntu-22.04'
        run: pnpm install

      - name: Build Android APK (Android Only)
        if: matrix.platform == 'ubuntu-22.04'
        run: pnpm tauri android build --target aarch64

      # ---- 🚀 编译分流 3：Android 编译完后，把生成的 APK 文件捞出来塞进 GitHub Release 里 ----
      - name: Upload Android APK to Release
        if: matrix.platform == 'ubuntu-22.04'
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/gen/android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}