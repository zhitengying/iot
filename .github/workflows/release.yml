name: "Publish Release"

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
          - platform: 'ubuntu-22.04'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---- 基础环境配置 (Windows & Ubuntu 通用) ----
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'ubuntu-22.04' && 'aarch64-linux-android' || 'x86_64-pc-windows-msvc' }}

      # 💡 强行移除工作区配置文件。这里采用兼容跨平台的 shell 语法，确保两端都能安全删掉它
      - name: Remove Workspace Config to Fix pnpm Bug
        shell: bash
        run: rm -f pnpm-workspace.yaml

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ---- 针对 Android 平台的特殊组件注入 ----
      - name: Setup Java and Android SDK (Android Only)
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK (Android Only)
        if: matrix.platform == 'ubuntu-22.04'
        uses: android-actions/setup-android@v3

      # ---- 📦 核心通用步骤：两端在各自的虚拟机里都要老老实实执行本地安装 ----
      - name: Install Node Dependencies
        run: pnpm install

      # ---- 🚀 编译分流 1：如果是 Windows 虚拟机，打 Windows 的 .exe/msi 包 ----
      - name: Build Windows App (Windows Only)
        if: matrix.platform == 'windows-latest'
        run: pnpm tauri build --target x86_64-pc-windows-msvc

      # ---- 🚀 编译分流 2：如果是 Linux 虚拟机，打 Android APK ----
      - name: Build Android APK (Android Only)
        if: matrix.platform == 'ubuntu-22.04'
        run: pnpm tauri android build --target aarch64

      # ---- 🚀 自动收集两端的编译产物，并统一上传到 GitHub Release 页面 ----
      - name: Upload Artifacts to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/gen/android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}